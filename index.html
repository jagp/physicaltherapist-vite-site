<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Page titles are rendered per-route (PageSeo / ServiceSeo) and hoisted by React. -->
    <!-- Self-hosted brand fonts: preload starts the fetch in parallel with the
         CSS bundle. crossorigin is REQUIRED even same-origin (fonts fetch in
         anonymous CORS mode; omitting it double-downloads). -->
    <link rel="preload" href="/fonts/work-sans-latin-var.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/fraunces-latin-var.woff2" as="font" type="font/woff2" crossorigin />
    <!-- Speculative loading (Chromium; silent no-op elsewhere). Works because
         every route is real static HTML (SSG) — prefetch all internal pages
         immediately, prerender on 200ms-hover intent. 6 tiny CDN pages = cheap. -->
    <script type="speculationrules">
    {
      "prefetch": [{ "where": { "href_matches": "/*" }, "eagerness": "immediate" }],
      "prerender": [{ "where": { "href_matches": "/*" }, "eagerness": "moderate" }]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
